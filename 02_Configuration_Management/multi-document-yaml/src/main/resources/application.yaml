# 1. Common Settings (Active for all profiles)
spring:
  profiles:
    active: dev  # Change this to 'prod' to switch environments
  application:
    name: DatabaseConnectorService

server:
  port: 8081     # Defined globally so both Dev and Prod use 8081

---
# 2. Development Profile
spring:
  config:
    activate:
      on-profile: dev
db:
  url: "jdbc:h2:mem:testdb"
  driver: "org.h2.Driver"
  message: "Running in LOCAL DEV mode with In-Memory Database"

---
# 3. Production Profile
spring:
  config:
    activate:
      on-profile: prod
db:
  url: "jdbc:mysql://10.0.0.55:3306/live_db"
  driver: "com.mysql.cj.jdbc.Driver"
  message: "WARNING: Running in LIVE PROD mode with MySQL"